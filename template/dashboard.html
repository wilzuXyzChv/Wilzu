<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot OTP iVASMS Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .header p {
            opacity: 0.9;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }
        .stat-card h3 {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        .stat-card .value {
            font-size: 2rem;
            font-weight: bold;
            color: #333;
        }
        .stat-card .unit {
            font-size: 0.9rem;
            color: #666;
        }
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            color: white;
        }
        .btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }
        .btn-primary { background: #667eea; }
        .btn-success { background: #48bb78; }
        .btn-danger { background: #f56565; }
        .btn-warning { background: #ed8936; }
        .logs {
            background: #1a1a2e;
            border-radius: 15px;
            padding: 20px;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            max-height: 300px;
            overflow-y: auto;
        }
        .logs h3 {
            color: white;
            margin-bottom: 15px;
        }
        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid #333;
        }
        .status-online {
            color: #48bb78;
            font-weight: bold;
        }
        .status-offline {
            color: #f56565;
            font-weight: bold;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .loading {
            animation: pulse 1s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Bot OTP iVASMS</h1>
            <p>Real-time monitoring dashboard untuk kode OTP dari iVASMS</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>📊 Status Bot</h3>
                <div class="value" id="botStatus">-</div>
            </div>
            <div class="stat-card">
                <h3>⏱️ Uptime</h3>
                <div class="value" id="uptime">-</div>
            </div>
            <div class="stat-card">
                <h3>📨 Total OTP</h3>
                <div class="value" id="totalOtps">-</div>
            </div>
            <div class="stat-card">
                <h3>🕐 Terakhir Cek</h3>
                <div class="value" id="lastCheck">-</div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-primary" onclick="checkOTP()">🔄 Cek OTP Manual</button>
            <button class="btn btn-success" onclick="startMonitor()">▶️ Start Monitor</button>
            <button class="btn btn-danger" onclick="stopMonitor()">⏹️ Stop Monitor</button>
            <button class="btn btn-warning" onclick="clearCache()">🗑️ Clear Cache</button>
        </div>

        <div class="logs">
            <h3>📋 Activity Logs</h3>
            <div id="logs"></div>
        </div>
    </div>

    <script>
        let lastLogTime = Date.now();
        
        async function fetchStatus() {
            try {
                const response = await fetch('/status');
                const data = await response.json();
                
                document.getElementById('botStatus').innerHTML = data.status === 'running' ? 
                    '<span class="status-online">✅ Online</span>' : '<span class="status-offline">❌ Offline</span>';
                document.getElementById('totalOtps').innerHTML = data.total_otps_sent;
                document.getElementById('lastCheck').innerHTML = data.last_check || 'Never';
                
                // Format uptime
                if (data.uptime_seconds) {
                    const days = Math.floor(data.uptime_seconds / 86400);
                    const hours = Math.floor((data.uptime_seconds % 86400) / 3600);
                    const minutes = Math.floor((data.uptime_seconds % 3600) / 60);
                    document.getElementById('uptime').innerHTML = `${days}d ${hours}h ${minutes}m`;
                }
                
                // Add log for status change
                if (data.last_check && data.last_check !== 'Never' && Date.parse(data.last_check) > lastLogTime) {
                    addLog(`✅ Pengecekan OTP selesai pada ${data.last_check}`);
                    lastLogTime = Date.now();
                }
            } catch (error) {
                console.error('Error fetching status:', error);
            }
        }
        
        function addLog(message) {
            const logsDiv = document.getElementById('logs');
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            logEntry.innerHTML = `[${new Date().toLocaleTimeString()}] ${message}`;
            logsDiv.insertBefore(logEntry, logsDiv.firstChild);
            
            // Keep only last 50 logs
            while (logsDiv.children.length > 50) {
                logsDiv.removeChild(logsDiv.lastChild);
            }
        }
        
        async function checkOTP() {
            addLog('🔄 Manual OTP check initiated...');
            try {
                const response = await fetch('/check-otp');
                const data = await response.json();
                addLog(`✅ Manual check completed at ${data.last_check}`);
                fetchStatus();
            } catch (error) {
                addLog(`❌ Manual check failed: ${error.message}`);
            }
        }
        
        async function startMonitor() {
            addLog('▶️ Starting background monitor...');
            try {
                const response = await fetch('/start-monitor');
                const data = await response.json();
                addLog(`✅ ${data.status === 'monitor started' ? 'Monitor started successfully' : data.status}`);
                fetchStatus();
            } catch (error) {
                addLog(`❌ Failed to start monitor: ${error.message}`);
            }
        }
        
        async function stopMonitor() {
            addLog('⏹️ Stopping background monitor...');
            try {
                const response = await fetch('/stop-monitor');
                const data = await response.json();
                addLog(`✅ ${data.status === 'monitor stopped' ? 'Monitor stopped successfully' : data.status}`);
                fetchStatus();
            } catch (error) {
                addLog(`❌ Failed to stop monitor: ${error.message}`);
            }
        }
        
        async function clearCache() {
            addLog('🗑️ Clearing OTP cache...');
            try {
                const response = await fetch('/clear-cache');
                const data = await response.json();
                addLog(`✅ ${data.message || 'Cache cleared'}`);
                fetchStatus();
            } catch (error) {
                addLog(`❌ Failed to clear cache: ${error.message}`);
            }
        }
        
        // Initial fetch and set interval
        fetchStatus();
        setInterval(fetchStatus, 5000);
        addLog('🤖 Bot dashboard loaded');
    </script>
</body>
                                                     </html>
